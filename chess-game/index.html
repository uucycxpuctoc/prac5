<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♜ DOM Chess | Практическая работа №5</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <h1>♔ DOM Chess</h1>
        
        <div class="game-info">
            <div class="turn-indicator">
                <span class="turn-label">Ход:</span>
                <span id="current-turn" class="turn-white">Белые</span>
            </div>
            <div class="captured-pieces">
                <div class="captured-white"></div>
                <div class="captured-black"></div>
            </div>
            <div class="game-controls">
                <button id="new-game-btn" class="btn">⟲ Новая игра</button>
                <button id="undo-btn" class="btn" disabled>↩ Отменить</button>
                <button id="resign-btn" class="btn" disabled>🏳 Сдаться</button>
            </div>
        </div>

        <div id="chessboard" class="chessboard"></div>

        <div class="move-history">
            <h3>История ходов</h3>
            <div id="move-list" class="move-list"></div>
        </div>

        <div id="check-message" class="check-message hidden">ШАХ!</div>
        <div id="game-over-message" class="game-over-message hidden"></div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/pieces.js"></script>
    <script src="js/board.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
