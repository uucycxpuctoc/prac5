<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♜ DOM Chess | Современные шахматы</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>♜ DOM Chess</h1>
            <div class="game-status">
                <div class="turn-indicator">
                    <span class="turn-label">Ход:</span>
                    <span class="current-player" id="currentPlayer">Белые</span>
                </div>
                <div class="check-indicator" id="checkIndicator" style="display: none;">⚡ Шах!</div>
            </div>
        </div>

        <div class="board-wrapper">
            <div class="board" id="chessBoard"></div>
        </div>

        <div class="game-controls">
            <button class="btn" id="newGameBtn">🔄 Новая игра</button>
            <button class="btn" id="undoBtn" disabled>↩️ Отменить ход</button>
            <button class="btn" id="resignBtn">🏳️ Сдаться</button>
        </div>

        <div class="captured-pieces">
            <div class="captured-title">Взятые фигуры:</div>
            <div class="captured-container">
                <div class="captured-white" id="capturedWhite"></div>
                <div class="captured-black" id="capturedBlack"></div>
            </div>
        </div>

        <div class="move-history">
            <div class="history-title">История ходов:</div>
            <div class="history-list" id="moveHistory"></div>
        </div>
    </div>

    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <h2 id="gameOverMessage">Игра окончена</h2>
            <button class="btn" id="modalNewGameBtn">Новая игра</button>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/pieces.js"></script>
    <script src="js/board.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
